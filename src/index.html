<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Clippy Guardian</title>
    <style>
      body {
        background-color: transparent;
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
      }
      #clippy-container {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        pointer-events: none; /* Let clicks pass through empty space */
      }
      #clippy-body {
        width: 100px;
        height: 100px;
        background-color: #FFD700; /* Gold-ish */
        border: 2px solid #000;
        border-radius: 50% 50% 0 0; /* Rough paperclip shape top */
        position: relative;
        animation: float 3s ease-in-out infinite;
        pointer-events: auto;
        cursor: pointer;
      }
      /* Eyes */
      .eye {
        position: absolute;
        top: 30px;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        border: 1px solid black;
      }
      .eye.left { left: 20px; }
      .eye.right { right: 20px; }
      .pupil {
        position: absolute;
        top: 5px;
        left: 5px;
        width: 10px;
        height: 10px;
        background: black;
        border-radius: 50%;
      }
      /* Eyebrows */
      .eyebrow {
        position: absolute;
        top: 15px;
        width: 25px;
        height: 5px;
        background: black;
        transition: all 0.3s ease;
      }
      .eyebrow.left { left: 15px; transform: rotate(-10deg); }
      .eyebrow.right { right: 15px; transform: rotate(10deg); }

      /* RAGE MODE STYLES */
      .rage #clippy-body {
        background-color: #FF4444; /* Angry Red */
        box-shadow: 0 0 20px #FF0000;
        animation: shake 0.1s infinite;
      }
      .rage .eye {
        background-color: #FFFF00; /* Yellow Sith Eyes */
        box-shadow: 0 0 10px #FFFF00;
      }
      .rage .pupil {
        height: 2px; /* Slit pupils */
        top: 9px;
      }
      .rage .eyebrow.left { transform: rotate(45deg); top: 20px; }
      .rage .eyebrow.right { transform: rotate(-45deg); top: 20px; }

      @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }

      #speech-bubble {
        background: #FFFFE0;
        border: 1px solid #000;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        max-width: 200px;
        font-size: 12px;
        display: none; /* Hidden by default */
        pointer-events: auto;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
      }
      
      #bubble-content {
        margin-bottom: 8px;
      }

      #bubble-actions {
        display: flex;
        justify-content: flex-end;
        gap: 5px;
      }

      .bubble-btn {
        background: #eee;
        border: 1px solid #999;
        border-radius: 3px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 11px;
      }
      .bubble-btn:hover {
        background: #ddd;
      }

      #settings-panel {
        background: white;
        border: 2px solid black;
        border-radius: 5px;
        padding: 10px;
        position: absolute;
        bottom: 120px; /* Above clippy */
        width: 150px;
        font-size: 12px;
        box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
        z-index: 100;
        display: none;
        pointer-events: auto;
        text-align: left;
      }
      #settings-panel h3 {
        margin: 0 0 8px 0;
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
        font-size: 14px;
      }
      #settings-panel label {
        display: block;
        margin-bottom: 5px;
        cursor: pointer;
        user-select: none;
      }
      #settings-panel input {
        margin-right: 5px;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
    </style>
  </head>
  <body>
    <div id="clippy-container">
      <div id="settings-panel">
        <h3>Clippy Settings</h3>
        <label><input type="checkbox" id="toggle-rage" checked> Rage Mode</label>
        <label><input type="checkbox" id="toggle-sound" checked> Sound Effects</label>
        <label><input type="checkbox" id="toggle-drift" checked> Monitor Context</label>
      </div>
      <div id="speech-bubble">
        <div id="bubble-content">
          It looks like you're writing code! <br>
          Need some help with those specs?
        </div>
        <div id="bubble-actions" style="display: none;">
          <button id="btn-yes" class="bubble-btn">Yes</button>
          <button id="btn-no" class="bubble-btn">No</button>
        </div>
      </div>
      <div id="clippy-body">
        <div class="eyebrow left"></div>
        <div class="eyebrow right"></div>
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
      </div>
    </div>
    <script>
      // Load the compiled renderer script from the dist folder
      // We use require() because the code is compiled to CommonJS
      require('../dist/renderer.js');
    </script>
  </body>
</html>
