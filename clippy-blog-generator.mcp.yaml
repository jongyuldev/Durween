name: Clippy-Blog-Generator
description: Orchestrates multiple agents to generate a technical blog post for a new feature.
trigger: "Clippy, write a blog post about my new feature [featureName]."

plan:
  - step: 1
    agent: CodeAgent
    task: "Analyze the source code directory named {{featureName}}. Return a bulleted list of its key functions and user-facing benefits."
    output_variable: code_analysis

  - step: 2
    agent: DocsAgent
    task: "Read the technical docs in the /docs/{{featureName}}.md file. Extract the installation steps and a 'Quickstart' code example."
    output_variable: docs_content

  - step: 3
    agent: MarketingAgent
    task: "Using the Kiro 'Marketing Persona' spec, generate 3 catchy headlines and a brief call-to-action for a new software feature."
    output_variable: marketing_copy

  - step: 4
    agent: MCP Agent
    task: "Combine the outputs from CodeAgent, DocsAgent, and MarketingAgent into a single, well-formatted markdown blog post. Start with a headline, add the benefits, include the Quickstart example, and end with the call-to-action."
    inputs:
      - code_analysis
      - docs_content
      - marketing_copy
